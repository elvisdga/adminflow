<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AdminFlow{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-overlay: rgba(3, 7, 18, 0.78);
            --card-bg: rgba(15, 23, 42, 0.88);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.14);
            --input-placeholder: rgba(255, 255, 255, 0.55);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --primary-start: #20c997;
            --primary-end: #0d6efd;
            --focus-ring: rgba(32, 201, 151, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 2.25rem 2rem;
            color: var(--text-main);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .brand-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            letter-spacing: -0.02em;
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.75rem;
        }

        .form-label {
            color: #e2e8f0;
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: #ffffff;
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: var(--input-placeholder);
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #20c997;
            box-shadow: 0 0 0 0.2rem var(--focus-ring);
            color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            padding: 0.9rem 1rem;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(13, 110, 253, 0.25);
        }

        .btn-login:focus {
            box-shadow: 0 0 0 0.2rem var(--focus-ring);
        }

        .auth-footer {
            margin-top: 1.25rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
        }

        .alert {
            border-radius: 0.75rem;
            text-align: left;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 1.75rem 1.25rem;
            }

            .brand-title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            {% block content %}{% endblock %}
        </div>
    </div>

</body>
</html>
