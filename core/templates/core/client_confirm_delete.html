{% extends "base.html" %}

{% block title %}Eliminar Cliente{% endblock %}

{% block content %}

<h2 class="text-danger">Eliminar Cliente</h2>

<p>¿Estás seguro que deseas eliminar a:</p>

<p>
    <strong>{{ client.name }}</strong> - {{ client.email }}
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'client_list' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
